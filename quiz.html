<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Quiz | Precious Anietem</title>
        <meta name="description" content="The Quiz contains questions about html and css">
        <meta name="author" content="Precious Anietem">
        <link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
    <main>
        <form>
            <fieldset>
                <label for="q1">Question 1: What is CSS?</label>
                <input type="text" id="q1" name="q1"><br>
          
                <label for="q2">Question 2: What is the meaning of HTML?</label>
                <textarea id="q2" name="q2" rows="2" required></textarea>
          
                <label for="q3">Question 3: Choose an HTML element:</label>
                <select id="q3" name="q3">
                    <option value="" selected disabled>Choose one.....</option>
                    <option value="1">Body</option>
                    <option value="2">Leg</option>
                    <option value="3">Hand</option>
                    <option value="4">Head</option>
                </select>
          
                <label for="q4">Question 4: How many HTML elements have been used in this form?</label>
                <input type="number" id="q4" name="q4" min="1" max="10">
          
                <input type="submit" value="Submit">
            </fieldset>     
        </form>
    </main>
</body>
</html>
