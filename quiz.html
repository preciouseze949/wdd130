<!DOCTYPE html>
<html lang="en-US">
    <head>
        <link rel="stylesheet" href="styles/quiz.css">
        <body>
            <main>
                <form>
                    <fieldset>

                         <label for="question 1">Question 1: What is css? </label>
                         <input type="text" id="q1" name="q1"><br>
                  
                         <label for="question 2">Question 2: What is the meaning of html</label>
                         <textarea id="message" name="message" rows="2" required></textarea>
                  
                         <label for="html elements">Question 3: Choose a html element:</label>
                         <select id="elements" name="elements">
                         <option value="Choose one"  selected disabled>Choose One.....</option>
                         <option value="1"> Body </option>
                         <option value="2"> Leg </option>
                         <option value="3"> Hand </option>
                         <option value="4"> Head </option>
                         </select>
                         <label for="quantity">Question 4: How many html elements have been used in this form</label>
                         <input type="number" id="quantity" name="quantity" min="1" max="10">
                  
                         <input type="submit" value="Submit">
                    </fieldset>     
                  </form>
                  
                  
            </main>
        </body>
       
    </head>
</html>
